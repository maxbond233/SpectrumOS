version: 1
disable_existing_loggers: false

formatters:
  standard:
    format: "%(asctime)s [%(levelname)s] %(name)s: %(message)s"
    datefmt: "%Y-%m-%d %H:%M:%S"

handlers:
  console:
    class: logging.StreamHandler
    formatter: standard
    stream: ext://sys.stdout
  file:
    class: logging.handlers.RotatingFileHandler
    formatter: standard
    filename: logs/spectrum.log
    maxBytes: 10485760   # 10MB
    backupCount: 5

loggers:
  spectrum:
    level: INFO
    handlers: [console, file]
    propagate: false
  spectrum.notion:
    level: INFO
  spectrum.agents:
    level: INFO
  spectrum.orchestrator:
    level: DEBUG

root:
  level: WARNING
  handlers: [console]
