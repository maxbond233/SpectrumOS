# 光谱 OS Agent System Configuration

database:
  url: "sqlite+aiosqlite:////opt/SpectrumOS/data/spectrum.db"

llm:
  default:
    provider: "openai_compat"
    model: "claude-sonnet-4-5-20250929"
    api_key_env: "CLAUDE_API_KEY"
    base_url_env: "CLAUDE_BASE_URL"
    max_tokens: 4096
    temperature: 0.3

  agents:
    prism: {}
    focus:
      model: "deepseek-v3.2"
      api_key_env: "DEEPSEEK_API_KEY"
      base_url_env: "DEEPSEEK_BASE_URL"
    dispersion: {}
    diffraction: {}

search:
  provider: "tavily"
  api_key_env: "TAVILY_API_KEY"
  max_results: 10

scheduler:
  tick_interval: 30
  max_concurrent_agents: 3

agents:
  enabled:
    - prism
    - focus
    - dispersion
    - diffraction

api:
  host: "0.0.0.0"
  port: 8078
