# 光谱 OS Agent System Configuration

database:
  url: "sqlite+aiosqlite:////opt/SpectrumOS/data/spectrum.db"

llm:
  default:
    provider: "openai_compat"
    model: "claude-sonnet-4-5-20250929"
    api_key_env: "CLAUDE_API_KEY"
    base_url_env: "CLAUDE_BASE_URL"
    max_tokens: 8192
    temperature: 0.3

  agents:
    prism: {}
    focus:
      model: "claude-sonnet-4-5-20250929"
      api_key_env: "CLAUDE_API_KEY"
      base_url_env: "CLAUDE_BASE_URL"
      max_tokens: 8192
    dispersion:
      max_tokens: 8192
    diffraction:
      max_tokens: 12288

search:
  providers:
    - name: "tavily"
      api_key_env: "TAVILY_API_KEY"
      max_results: 8
    - name: "semantic_scholar"
      max_results: 5
    - name: "serpapi"
      api_key_env: "SERPAPI_API_KEY"
      max_results: 5
    - name: "perplexity"
      api_key_env: "PERPLEXITY_API_KEY"
      max_results: 3
      enabled: false
  extractor:
    provider: "jina"
    max_content_length: 20000
  max_search_rounds: 3

scheduler:
  tick_interval: 30
  max_concurrent_agents: 3

agents:
  enabled:
    - prism
    - focus
    - dispersion
    - diffraction

api:
  host: "0.0.0.0"
  port: 8078
