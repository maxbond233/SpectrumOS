<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>光谱 OS · Explorer</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🔮</text></svg>">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#06080d;--bg2:rgba(255,255,255,.03);--bg3:rgba(255,255,255,.06);
  --bd:rgba(255,255,255,.06);--bd2:rgba(255,255,255,.12);
  --t1:rgba(255,255,255,.92);--t2:rgba(255,255,255,.5);--t3:rgba(255,255,255,.28);
  --purple:#8b5cf6;--blue:#3b82f6;--cyan:#06b6d4;--green:#10b981;
  --amber:#f59e0b;--red:#ef4444;--pink:#ec4899;
  --r:12px;--r-sm:8px;--r-lg:16px;
  --sans:'Noto Sans SC',system-ui,sans-serif;--mono:'JetBrains Mono',monospace;
}
html{font-size:15px}
body{font-family:var(--sans);background:var(--bg);color:var(--t1);min-height:100vh;overflow-x:hidden}

.ambient{position:fixed;inset:0;z-index:0;pointer-events:none;overflow:hidden}
.ambient::before{content:'';position:absolute;width:600px;height:600px;top:-200px;left:-100px;background:radial-gradient(circle,rgba(139,92,246,.08) 0%,transparent 70%);animation:drift 20s ease-in-out infinite}
.ambient::after{content:'';position:absolute;width:500px;height:500px;bottom:-150px;right:-100px;background:radial-gradient(circle,rgba(6,182,212,.06) 0%,transparent 70%);animation:drift 25s ease-in-out infinite reverse}
@keyframes drift{0%,100%{transform:translate(0,0)}33%{transform:translate(40px,30px)}66%{transform:translate(-20px,50px)}}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
@keyframes spin{to{transform:rotate(360deg)}}

.layout{position:relative;z-index:1;max-width:1200px;margin:0 auto;padding:1.5rem 1.5rem 3rem;display:flex;flex-direction:column;gap:1rem}

.header{display:flex;align-items:center;justify-content:space-between;padding:1rem 1.2rem;border-radius:var(--r-lg);background:linear-gradient(135deg,rgba(139,92,246,.18),rgba(6,182,212,.08));border:1px solid rgba(139,92,246,.35);backdrop-filter:blur(18px);box-shadow:0 18px 45px rgba(15,23,42,.6)}
.header-left{display:flex;align-items:center;gap:.8rem}
.header-title{font-size:1.15rem;font-weight:500;letter-spacing:.04em;text-transform:uppercase}
.header-sub{font-size:.72rem;color:var(--t2);font-family:var(--mono)}
.back-link{font-size:.72rem;font-family:var(--mono);color:var(--t2);text-decoration:none;padding:6px 12px;border-radius:999px;border:1px solid rgba(148,163,184,.6);background:rgba(15,23,42,.7);display:inline-flex;align-items:center;gap:6px;transition:all .2s}
.back-link:hover{color:var(--t1);border-color:var(--bd2);background:rgba(15,23,42,.9)}

.main{display:flex;gap:1.2rem;min-height:520px}
.sidebar{width:190px;background:var(--bg2);border-radius:var(--r-lg);border:1px solid var(--bd);padding:1rem .9rem;display:flex;flex-direction:column;gap:.4rem}
.sidebar-title{font-size:.7rem;color:var(--t3);font-family:var(--mono);text-transform:uppercase;letter-spacing:1px;margin-bottom:.4rem;padding-bottom:.4rem;border-bottom:1px solid rgba(148,163,184,.25)}
.nav-item{display:flex;align-items:center;gap:.5rem;padding:.45rem .55rem;border-radius:10px;font-size:.8rem;color:var(--t2);cursor:pointer;transition:all .2s}
.nav-item span.emoji{width:1.2rem;text-align:center}
.nav-item.active{background:var(--bg3);color:var(--t1);border:1px solid var(--bd2)}
.nav-item:hover{background:var(--bg3);color:var(--t1)}

.content{flex:1;background:var(--bg2);border-radius:var(--r-lg);border:1px solid var(--bd);padding:1.2rem 1.3rem;min-height:100%;animation:fadeUp .35s ease both}

.filter-bar{display:flex;flex-wrap:wrap;gap:.6rem;margin-bottom:.8rem;align-items:center}
.filter-label{font-size:.68rem;color:var(--t3);font-family:var(--mono);text-transform:uppercase;letter-spacing:.6px;margin-right:.4rem}
.filter-select{padding:4px 10px;border-radius:999px;border:1px solid var(--bd);background:var(--bg);color:var(--t1);font-size:.75rem;font-family:var(--sans);outline:none;min-width:110px}
.filter-select:focus{border-color:var(--purple)}

.table{width:100%;border-collapse:collapse;font-size:.78rem}
.table thead{background:rgba(15,23,42,.9)}
.table th,.table td{padding:.45rem .55rem;border-bottom:1px solid rgba(148,163,184,.3);text-align:left}
.table th{font-size:.7rem;font-family:var(--mono);color:var(--t3);text-transform:uppercase;letter-spacing:.6px}
.table tbody tr{cursor:pointer;transition:background .15s}
.table tbody tr:hover{background:rgba(15,23,42,.85)}
.table-wrap{width:100%;overflow-x:auto;-webkit-overflow-scrolling:touch}
.badge{display:inline-flex;align-items:center;justify-content:center;padding:1px 7px;border-radius:999px;font-size:.64rem;font-family:var(--mono);border:1px solid rgba(148,163,184,.4);color:var(--t2)}

.status-badge{border-radius:999px;padding:1px 7px;font-size:.64rem;font-family:var(--mono)}

.pagination{display:flex;align-items:center;justify-content:space-between;margin-top:.8rem;font-size:.72rem;color:var(--t3);font-family:var(--mono)}
.pager-btn{padding:4px 10px;border-radius:999px;border:1px solid var(--bd);background:none;color:var(--t2);font-size:.72rem;font-family:var(--mono);cursor:pointer;transition:all .15s}
.pager-btn[disabled]{opacity:.4;cursor:not-allowed}
.pager-btn:not([disabled]):hover{border-color:var(--bd2);color:var(--t1);background:var(--bg3)}
a:focus-visible,button:focus-visible,select:focus-visible{
  outline:2px solid var(--purple);
  outline-offset:2px;
}

.detail-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:.8rem}
.detail-back{font-size:.72rem;font-family:var(--mono);color:var(--t2);cursor:pointer;display:inline-flex;align-items:center;gap:4px}
.detail-back:hover{color:var(--t1)}
.detail-title{font-size:1rem;font-weight:500}
.meta-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:.4rem;margin-bottom:.8rem;font-size:.76rem}
.meta-item-label{font-size:.65rem;font-family:var(--mono);color:var(--t3);text-transform:uppercase;letter-spacing:.5px}
.meta-item-value{font-size:.78rem;color:var(--t1)}
.meta-link{color:var(--blue);text-decoration:none;font-size:.76rem}
.meta-link:hover{text-decoration:underline}

.section-card{background:var(--bg3);border-radius:var(--r);border:1px solid var(--bd);padding:.8rem .9rem;margin-top:.7rem}
.section-title{font-size:.78rem;font-family:var(--mono);color:var(--t3);text-transform:uppercase;letter-spacing:.6px;margin-bottom:.35rem}
.section-body{font-size:.8rem;color:var(--t2);white-space:pre-wrap;line-height:1.6}
.section-body,.meta-item-value,.log-meta{overflow-wrap:anywhere;word-break:break-word}

#output-content{
  white-space:normal;
  word-wrap:break-word;
  line-height:1.7;
  padding:1rem;
  max-width:800px;
}
#output-content h1,
#output-content h2,
#output-content h3{
  margin-top:1.5rem;
  margin-bottom:.5rem;
}
#output-content p{
  margin-bottom:.8rem;
}
#output-content ul,
#output-content ol{
  margin-bottom:.8rem;
  padding-left:1.5rem;
}
#output-content pre{
  overflow:auto;
  max-width:100%;
  background:rgba(15,23,42,.9);
  border:1px solid var(--bd);
  border-radius:var(--r-sm);
  padding:.7rem;
}
#output-content table{
  display:block;
  overflow-x:auto;
  max-width:100%;
}

.source-detail .field-content{
  white-space:pre-wrap;
  word-wrap:break-word;
}

.timeline{display:flex;flex-direction:column;gap:.6rem;font-size:.76rem}
.log-item{padding:.55rem .65rem;border-radius:var(--r-sm);border:1px solid var(--bd);background:rgba(15,23,42,.9)}
.log-row{display:flex;align-items:center;flex-wrap:wrap;gap:.4rem;margin-bottom:.25rem}
.log-time{font-size:.7rem;color:var(--t3);font-family:var(--mono)}
.log-title{font-size:.8rem;color:var(--t1)}
.actor-badge{padding:1px 6px;border-radius:999px;font-size:.64rem;font-family:var(--mono);background:rgba(148,163,184,.15);border:1px solid rgba(148,163,184,.4)}
.chip{padding:1px 6px;border-radius:999px;font-size:.64rem;font-family:var(--mono);background:rgba(15,23,42,.9);border:1px solid rgba(148,163,184,.4)}
.log-meta{font-size:.7rem;color:var(--t2)}
.log-more{margin-top:.3rem;font-size:.72rem;color:var(--t2);cursor:pointer}
.log-more:hover{color:var(--t1)}

.fold{margin-top:.4rem;background:rgba(15,23,42,.9);border-radius:var(--r-sm);border:1px solid var(--bd);padding:.5rem .6rem;font-size:.75rem}
.fold-head{display:flex;align-items:center;justify-content:space-between;cursor:pointer}
.fold-body{margin-top:.3rem;white-space:pre-wrap;color:var(--t2)}

.loading{display:flex;align-items:center;justify-content:center;padding:2rem;color:var(--t3);font-size:.8rem;gap:.5rem}
.spinner{width:16px;height:16px;border:2px solid var(--bd);border-top-color:var(--purple);border-radius:50%;animation:spin .8s linear infinite}
.error-box{background:rgba(239,68,68,.08);border:1px solid rgba(239,68,68,.2);border-radius:var(--r);padding:1rem;text-align:center;color:var(--red);font-size:.8rem}

.mobile-list{display:none}
.mobile-card{background:rgba(15,23,42,.85);border:1px solid var(--bd);border-radius:var(--r);padding:.8rem;margin-bottom:.6rem;cursor:pointer}
.mobile-card-title{font-size:.86rem;font-weight:500;margin-bottom:.35rem}
.mobile-card-meta{display:flex;flex-wrap:wrap;gap:.35rem;margin-bottom:.3rem}
.mobile-card-line{font-size:.72rem;color:var(--t2)}
.mobile-card-actions{display:flex;gap:.4rem;margin-top:.5rem}

@media(max-width:900px){
  .main{flex-direction:column}
  .sidebar{width:100%;flex-direction:row;overflow-x:auto;white-space:nowrap}
  .sidebar-title{border-bottom:none;margin-bottom:0;margin-right:.6rem}
  .nav-item{flex:0 0 auto}
}
@media(max-width:600px){
  .layout{padding:1rem}
  .header{flex-direction:column;align-items:flex-start;gap:.7rem}
  .content{padding:1rem}
  .meta-grid{grid-template-columns:1fr}
  .pagination{flex-direction:column;align-items:flex-start;gap:.5rem}
  .table-wrap{display:none}
  .mobile-list{display:block}
  .pager-btn{min-height:36px;padding:8px 12px}
}
</style>
</head>
<body>
<div class="ambient"></div>
<div class="layout">
  <header class="header">
    <div class="header-left">
      <span>🛰️</span>
      <div>
        <div class="header-title">Spectrum Explorer</div>
        <div class="header-sub">深度浏览 · Sources / Wiki / Outputs / Tasks / Logs</div>
      </div>
    </div>
    <a href="/" class="back-link">← 返回 Dashboard</a>
  </header>
  <div class="main">
    <aside class="sidebar">
      <div class="sidebar-title">Explorer</div>
      <div class="nav-item" data-view="sources"><span class="emoji">📚</span><span>素材 Sources</span></div>
      <div class="nav-item" data-view="wiki"><span class="emoji">🧠</span><span>知识卡 Wiki</span></div>
      <div class="nav-item" data-view="outputs"><span class="emoji">📄</span><span>产出 Outputs</span></div>
      <div class="nav-item" data-view="tasks"><span class="emoji">🎯</span><span>任务 Tasks</span></div>
      <div class="nav-item" data-view="logs"><span class="emoji">📋</span><span>活动日志 Logs</span></div>
      <div class="nav-item" data-view="reviews"><span class="emoji">✅</span><span>Reviews</span></div>
    </aside>
    <main id="content" class="content"></main>
  </div>
</div>

<script>
const STATUS_COLORS = {
  'Inbox':'#6b7280','Todo':'#3b82f6','Doing':'#f59e0b','Waiting':'#8b5cf6',
  'Done':'#10b981','Failed':'#ef4444','Archived':'#374151',
  'Collected':'#6b7280','To Read':'#3b82f6','Reading':'#f59e0b','Processed':'#10b981',
  'Seed':'#f59e0b','Growing':'#3b82f6','Stable':'#10b981',
  '未开始':'#6b7280','进行中':'#3b82f6','待审核':'#f59e0b','完成':'#10b981',
};

const STATE = {
  sources:{limit:20,offset:0,filters:{status:'',domain:'',project_ref:''},lastItems:[]},
  wiki:{limit:20,offset:0,filters:{type:'',domain:'',maturity:'',project_ref:''},lastItems:[]},
  outputs:{limit:20,offset:0,filters:{status:'',type:'',project_ref:''},lastItems:[]},
  tasks:{limit:20,offset:0,filters:{status:'',agent:'',type:'',project_ref:''},lastItems:[]},
  logs:{limit:50,offset:0,filters:{actor:'',action_type:'',target_db:''},lastItems:[]},
  reviews:{lastItems:[]},
};
const AGENT_KEY_TO_LABEL = {
  prism: '棱镜',
  focus: '聚光',
  dispersion: '色散',
  diffraction: '衍射',
};
const AGENT_LABEL_TO_KEY = {
  '棱镜': 'prism',
  '聚光': 'focus',
  '色散': 'dispersion',
  '衍射': 'diffraction',
};
const DYNAMIC_FILTER_POOL = {
  sources: { status: new Set(), domain: new Set() },
  wiki: { type: new Set(), domain: new Set(), maturity: new Set() },
  outputs: { status: new Set(), type: new Set() },
  tasks: { status: new Set(), agent: new Set(), type: new Set() },
  logs: { actor: new Set(), action_type: new Set(), target_db: new Set() },
};
const LIST_VIEWS = new Set(['sources','wiki','outputs','tasks','logs','reviews']);
const DETAIL_VIEWS = new Set(['source','wiki','output','task','project']);
let LAST_LIST_VIEW = 'sources';

function setActiveNav(view){
  document.querySelectorAll('.nav-item').forEach(el=>{
    el.classList.toggle('active', el.dataset.view===view);
  });
}

function badgeHtml(text,color){
  const c = color || STATUS_COLORS[text] || '#6b7280';
  return `<span class="status-badge" style="color:${c};border:1px solid ${c}40;background:${c}10">${text}</span>`;
}

function formatDate(iso){
  if(!iso) return '';
  try{
    return new Date(iso).toLocaleString('zh-CN');
  }catch(e){return iso;}
}

function timeAgo(iso){
  if(!iso) return '';
  try{
    const now = Date.now();
    const t = new Date(iso).getTime();
    const diff = Math.max(0, now - t);
    const sec = Math.floor(diff/1000);
    if(sec<60) return `${sec} 秒前`;
    const min = Math.floor(sec/60);
    if(min<60) return `${min} 分钟前`;
    const h = Math.floor(min/60);
    if(h<24) return `${h} 小时前`;
    const d = Math.floor(h/24);
    if(d<7) return `${d} 天前`;
    const w = Math.floor(d/7);
    if(w<4) return `${w} 周前`;
    const m = Math.floor(d/30);
    if(m<12) return `${m} 个月前`;
    const y = Math.floor(d/365);
    return `${y} 年前`;
  }catch(e){return iso;}
}

function isMobileView(){
  return window.matchMedia('(max-width: 600px)').matches;
}

function normalizeAgentValue(value){
  if(!value) return '';
  return AGENT_LABEL_TO_KEY[value] || value;
}

function displayAgentValue(value){
  if(!value) return '';
  if(AGENT_KEY_TO_LABEL[value]) return `${AGENT_KEY_TO_LABEL[value]} (${value})`;
  if(AGENT_LABEL_TO_KEY[value]) return `${value} (${AGENT_LABEL_TO_KEY[value]})`;
  return value;
}

function addToDynamicPool(view, key, value){
  if(!DYNAMIC_FILTER_POOL[view] || !DYNAMIC_FILTER_POOL[view][key]) return;
  if(value === undefined || value === null) return;
  const text = String(value).trim();
  if(!text) return;
  DYNAMIC_FILTER_POOL[view][key].add(text);
}

function appendSelectOptions(selectId, values, labelFormatter){
  const sel = document.getElementById(selectId);
  if(!sel) return;
  const existing = new Set(Array.from(sel.options).map(o => o.value));
  const sorted = Array.from(values).sort((a,b) => a.localeCompare(b, 'zh-CN'));
  sorted.forEach(value => {
    if(existing.has(value)) return;
    const opt = document.createElement('option');
    opt.value = value;
    opt.textContent = labelFormatter ? labelFormatter(value) : value;
    sel.appendChild(opt);
  });
}

function hydrateDynamicFilterOptions(view){
  if(view === 'sources'){
    appendSelectOptions('f-src-status', DYNAMIC_FILTER_POOL.sources.status);
    appendSelectOptions('f-src-domain', DYNAMIC_FILTER_POOL.sources.domain);
    if(document.getElementById('f-src-status')) document.getElementById('f-src-status').value = STATE.sources.filters.status;
    if(document.getElementById('f-src-domain')) document.getElementById('f-src-domain').value = STATE.sources.filters.domain;
  } else if(view === 'wiki'){
    appendSelectOptions('f-wiki-type', DYNAMIC_FILTER_POOL.wiki.type);
    appendSelectOptions('f-wiki-domain', DYNAMIC_FILTER_POOL.wiki.domain);
    appendSelectOptions('f-wiki-maturity', DYNAMIC_FILTER_POOL.wiki.maturity);
    if(document.getElementById('f-wiki-type')) document.getElementById('f-wiki-type').value = STATE.wiki.filters.type;
    if(document.getElementById('f-wiki-domain')) document.getElementById('f-wiki-domain').value = STATE.wiki.filters.domain;
    if(document.getElementById('f-wiki-maturity')) document.getElementById('f-wiki-maturity').value = STATE.wiki.filters.maturity;
  } else if(view === 'outputs'){
    appendSelectOptions('f-out-status', DYNAMIC_FILTER_POOL.outputs.status);
    appendSelectOptions('f-out-type', DYNAMIC_FILTER_POOL.outputs.type);
    if(document.getElementById('f-out-status')) document.getElementById('f-out-status').value = STATE.outputs.filters.status;
    if(document.getElementById('f-out-type')) document.getElementById('f-out-type').value = STATE.outputs.filters.type;
  } else if(view === 'tasks'){
    appendSelectOptions('f-task-status', DYNAMIC_FILTER_POOL.tasks.status);
    appendSelectOptions('f-task-type', DYNAMIC_FILTER_POOL.tasks.type);
    appendSelectOptions('f-task-agent', DYNAMIC_FILTER_POOL.tasks.agent, displayAgentValue);
    if(document.getElementById('f-task-status')) document.getElementById('f-task-status').value = STATE.tasks.filters.status;
    if(document.getElementById('f-task-type')) document.getElementById('f-task-type').value = STATE.tasks.filters.type;
    if(document.getElementById('f-task-agent')) document.getElementById('f-task-agent').value = STATE.tasks.filters.agent;
  } else if(view === 'logs'){
    appendSelectOptions('f-log-actor', DYNAMIC_FILTER_POOL.logs.actor, displayAgentValue);
    appendSelectOptions('f-log-action', DYNAMIC_FILTER_POOL.logs.action_type);
    appendSelectOptions('f-log-db', DYNAMIC_FILTER_POOL.logs.target_db);
    if(document.getElementById('f-log-actor')) document.getElementById('f-log-actor').value = STATE.logs.filters.actor;
    if(document.getElementById('f-log-action')) document.getElementById('f-log-action').value = STATE.logs.filters.action_type;
    if(document.getElementById('f-log-db')) document.getElementById('f-log-db').value = STATE.logs.filters.target_db;
  }
}

function buildPagination(total, limit, offset, view){
  const start = total ? offset + 1 : 0;
  const end = Math.min(offset + limit, total);
  const isFirst = offset <= 0;
  const isLast = offset + limit >= total;
  return `
    <div class="pagination">
      <span>第 ${start}-${end} 条，共 ${total} 条</span>
      <div>
        <button class="pager-btn" ${isFirst?'disabled':''} onclick="changePage('${view}',-1)">上一页</button>
        <button class="pager-btn" ${isLast?'disabled':''} onclick="changePage('${view}',1)">下一页</button>
      </div>
    </div>
  `;
}

function getHashState(){
  const raw = location.hash.slice(1);
  const [path, query=''] = raw.split('?');
  const [view, id] = path.split('/');
  const params = new URLSearchParams(query);
  return {view, id, params};
}

function applyParamsToState(view, params){
  const st = STATE[view];
  if(!st) return;
  if(st.filters){
    Object.keys(st.filters).forEach(k => {
      if(params.has(k)) st.filters[k] = params.get(k);
    });
  }
  if(params.has('offset')) st.offset = Math.max(parseInt(params.get('offset') || '0', 10) || 0, 0);
  if(params.has('limit')) st.limit = Math.max(parseInt(params.get('limit') || String(st.limit || 20), 10) || (st.limit || 20), 1);
}

function updateListStateUrl(view){
  const st = STATE[view];
  if(!st) return;
  const params = new URLSearchParams();
  if(st.filters){
    Object.entries(st.filters).forEach(([k,v]) => {
      if(v !== '' && v != null) params.set(k, v);
    });
  }
  if(st.offset) params.set('offset', String(st.offset));
  if(st.limit) params.set('limit', String(st.limit));
  const query = params.toString();
  const hash = `${view}${query ? `?${query}` : ''}`;
  history.replaceState(null, '', `#${hash}`);
}

async function fetchList(endpoint, params){
  const url = new URL('/api/'+endpoint, location.origin);
  Object.entries(params||{}).forEach(([k,v])=>{ if(v!=='' && v!=null) url.searchParams.set(k,v); });
  const resp = await fetch(url);
  if(!resp.ok) throw new Error('HTTP '+resp.status);
  return resp.json();
}

async function fetchDetail(endpoint, id){

async function approveReview(id, table, btn){
  const map = {
    projects:{endpoint:'projects', body:{review_needed:false}},
    sources:{endpoint:'sources', body:{review_needed:false}},
    wiki_cards:{endpoint:'wiki-cards', body:{needs_review:false}},
    outputs:{endpoint:'outputs', body:{review_needed:false}},
    tasks:{endpoint:'tasks', body:{review_needed:false}},
  };
  const cfg = map[table];
  if(!cfg) return;
  try{
    if(btn){
      btn.disabled = true;
      btn.textContent = '...';
    }
    const resp = await fetch(`/api/${cfg.endpoint}/${id}`,{
      method:'PATCH',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify(cfg.body),
    });
    if(!resp.ok) throw new Error('HTTP '+resp.status);
    // remove from local list and re-render
    STATE.reviews.lastItems = (STATE.reviews.lastItems||[]).filter(r=>r.id!==id);
    loadReviews();
  }catch(e){
    alert('Approve 失败: '+e.message);
  }finally{
    if(btn){
      btn.disabled = false;
      btn.textContent = 'Approve';
    }
  }
}

      <div class="table-wrap">
        <table class="table">
          <thead><tr>
            <th>Name</th><th>Status</th><th>Type</th><th>Agent</th><th>Depends</th><th>Project</th><th>Retries</th>
          </tr></thead>
          <tbody>${rows}</tbody>
        </table>
      </div>
      <div class="mobile-list">${mobileCards}</div>
      ${buildPagination(total, limit, offset, 'tasks')}
    `;
    st.limit = limit; st.offset = offset;
    updateListStateUrl('tasks');
  }catch(e){
    area.innerHTML = `<div class="error-box">加载失败: ${e.message}</div>`;
  }
}

async function loadLogs(){
  const st = STATE.logs;
  const area = document.getElementById('list-area');
  area.innerHTML = `<div class="loading"><div class="spinner"></div>Loading logs...</div>`;
  try{
    const queryFilters = {...st.filters, actor: normalizeAgentValue(st.filters.actor)};
    const data = await fetchList('logs',{...queryFilters,limit:st.limit,offset:st.offset});
    st.lastItems = data.items || [];
    st.lastItems.forEach(l => {
      addToDynamicPool('logs', 'actor', l.actor);
      addToDynamicPool('logs', 'action_type', l.action_type);
      addToDynamicPool('logs', 'target_db', l.target_db);
    });
    hydrateDynamicFilterOptions('logs');
    const logs = st.lastItems.map(l=>{
      const actorColor = l.actor==='human' ? '#e5e7eb' : '#8b5cf6';
      return `<div class="log-item">
        <div class="log-row">
          <span class="log-time">${formatDate(l.created_at)}</span>
          <span class="actor-badge" style="color:${actorColor};border-color:${actorColor}40;background:${actorColor}10">${l.actor}</span>
          <span class="chip">${l.action_type}</span>
          <span class="log-meta">${l.target_db||''}${l.target_record?` #${l.target_record}`:''}</span>
        </div>
        <div class="log-title">${l.title}</div>
        ${(l.before||l.after)?`
          <div class="log-more" onclick="toggleLogDetail(this)">查看 before / after</div>
          <div class="fold" style="display:none">
            <div class="section-title" style="margin-bottom:.2rem">Before</div>
            <div class="section-body">${(l.before||'').replace(/</g,'&lt;')}</div>
            <div class="section-title" style="margin:.4rem 0 .2rem">After</div>
            <div class="section-body">${(l.after||'').replace(/</g,'&lt;')}</div>
          </div>
        `:''}
      </div>`;
    }).join('') || `<div class="error-box" style="text-align:left">暂无日志</div>`;
    const total = data.total||0, limit = data.limit||st.limit, offset = data.offset||st.offset;
    area.innerHTML = `
      <div class="timeline">${logs}</div>
      ${buildPagination(total, limit, offset, 'logs')}
    `;
    st.limit = limit; st.offset = offset;
    updateListStateUrl('logs');
  }catch(e){
    area.innerHTML = `<div class="error-box">加载失败: ${e.message}</div>`;
  }
}

function changePage(view, delta){
  const st = STATE[view];
  if(!st) return;
  const newOffset = st.offset + delta*(st.limit||20);
  if(newOffset<0) return;
  st.offset = newOffset;
  updateListStateUrl(view);
  renderList(view);
}

function toggleLogDetail(el){
  const fold = el.nextElementSibling;
  if(!fold) return;
  const visible = fold.style.display !== 'none';
  fold.style.display = visible ? 'none' : 'block';
}

        <div class="detail-header">

        </div>
        <div class="section-card" style="margin-top:.2rem;margin-bottom:.6rem">

      `;
      if(contentText && window.marked){
        const contentEl = document.getElementById('output-content');
        if(contentEl){
          // Protect LaTeX from marked.js: extract formulas, parse markdown, restore
          const mathBlocks = [];
          let protected = contentText
            .replace(/\$\$([\s\S]+?)\$\$/g, (m) => { mathBlocks.push(m); return `%%MATH${mathBlocks.length-1}%%`; })
            .replace(/\$([^\n$]+?)\$/g, (m) => { mathBlocks.push(m); return `%%MATH${mathBlocks.length-1}%%`; })
            .replace(/\\\[([\s\S]+?)\\\]/g, (m) => { mathBlocks.push(m); return `%%MATH${mathBlocks.length-1}%%`; })
            .replace(/\\\((.+?)\\\)/g, (m) => { mathBlocks.push(m); return `%%MATH${mathBlocks.length-1}%%`; });
          let html = marked.parse(protected);
          html = html.replace(/%%MATH(\d+)%%/g, (_, i) => mathBlocks[parseInt(i)]);

          if(window.renderMathInElement){
            renderMathInElement(contentEl, {
              delimiters: [
                {left: "$$", right: "$$", display: true},
                {left: "$", right: "$", display: false},
                {left: "\\(", right: "\\)", display: false},

function route(){
  const {view, id, params} = getHashState();
  if(!view){
    location.hash = 'sources';
    return;
  }
  if(id && DETAIL_VIEWS.has(view)){
    renderDetail(view,id);
    return;
  }
  if(LIST_VIEWS.has(view)){
    applyParamsToState(view, params);
    renderList(view);
    return;
  }
  location.hash = 'sources';
}

document.querySelectorAll('.nav-item').forEach(el=>{
  el.addEventListener('click',()=>{
    const v = el.dataset.view;
    location.hash = v;
  });
});

window.addEventListener('hashchange', route);
route();
</script>
